name: Auto-reload bot after deploy

on:
  push:
    branches: [main]

jobs:
  reload:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render to finish deploying (~4 min)
        run: sleep 240

      - name: Call /reload on the live bot
        run: |
          ADMIN="${{ secrets.ADMIN_SECRET }}"
          URL="https://michael-doors-whatsapp-bot.onrender.com/reload"
          if [ -n "$ADMIN" ]; then
            URL="${URL}?admin=${ADMIN}"
          fi

          echo "Calling: $URL"
          STATUS=$(curl -s -o /tmp/reload_body.txt -w "%{http_code}" --max-time 45 "$URL")
          BODY=$(cat /tmp/reload_body.txt)

          echo "Status: $STATUS"
          echo "Response: $BODY"

          if [ "$STATUS" = "200" ]; then
            echo "Bot reloaded successfully"
          else
            echo "WARNING: /reload returned HTTP $STATUS — bot may still be starting up. Render deploy succeeded regardless."
          fi
