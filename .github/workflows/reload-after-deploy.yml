name: Auto-reload bot after deploy

on:
  push:
    branches: [main]

jobs:
  reload:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render to deploy (~3 min)
        run: sleep 180

      - name: Call /reload on the live bot
        run: |
          ADMIN="${{ secrets.ADMIN_SECRET }}"
          URL="https://michael-doors-whatsapp-bot.onrender.com/reload"
          if [ -n "$ADMIN" ]; then
            URL="${URL}?admin=${ADMIN}"
          fi

          echo "Calling: $URL"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$URL")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Status: $STATUS"
          echo "Response: $BODY"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: /reload returned HTTP $STATUS"
            exit 1
          fi

          echo "Bot reloaded successfully"
